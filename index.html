<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal Receiver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>

    <div id="startup-screen">
        <div class="modal square-box">
            <h2 class="glitch-text">TERMINAL INACTIVE</h2>
            <p>Awaiting scrying pool initialization.</p>
            <button id="start-btn" class="square-btn">OPEN CHANNEL</button>
        </div>
    </div>

    <div id="terminal-container" class="hidden">
        <div id="status-bar">
            <span id="sys-status">SYS: ONLINE</span>
            <span id="battery-status">RESONANCE: 0%</span>
        </div>
        
        <div id="scrying-container" class="square-box">
            <canvas id="scrying-pool" width="64" height="64"></canvas>
            <div class="scrying-label">[ OPTICAL SCRYING ACTIVE ]</div>
        </div>

        <ul id="chat-feed">
            <li><span class="system">[SYS]</span> Scrying pool active. Awaiting synchronicity...</li>
        </ul>

        <div id="user-input-area">
            <span class="prompt-arrow">></span>
            <input type="text" id="user-text" placeholder="Transmit intent..." autocomplete="off">
            <button id="send-btn" class="square-btn">SEND</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
